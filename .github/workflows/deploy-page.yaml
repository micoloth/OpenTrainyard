name: deploy-github-page

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      - name: Install rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Install Dependencies
        run: sudo apt-get update; sudo apt-get install pkg-config libx11-dev libasound2-dev libudev-dev
      - name: Install trunk
        uses: jetli/trunk-action@v0.1.0
        with:
          version: 'latest'
      - name: Add wasm target
        run: |
          rustup target add wasm32-unknown-unknown
      - name: Build Release
        run: |
          trunk build --release --public-url "/${GITHUB_REPOSITORY#*/}/"
      # Note: wasm-opt may fail with bulk memory errors on Bevy WASM builds
      # The Cargo.toml already has size optimizations (opt-level='z', lto, strip)
      # which provide most of the benefit
      - name: optimize Wasm
        uses: NiklasEi/wasm-opt-action@v2
        with:
          file: dist/*.wasm
          options: '--enable-bulk-memory -Oz'
        continue-on-error: true
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.2.5
        with:
          branch: gh-pages
          folder: dist
